# ---------------------------------------------------------------------------
# 8. Ansible collections
# ---------------------------------------------------------------------------
# Exact-pinning is required for release reproducibility. Current state is
# UNPINNED (no version) for workstation/repo requirements and RANGED (>=,<) for
# the EE build. Release-lane requirements must become exact pins before release.
ansible_collections:
  - file: "dmf-infra: k3s-lab-bootstrap/requirements.yml"
    purpose: "workstation / control-node collections"
    lanes: [sandbox-required, aws-required]
    must_exact_pin_before_release: true
    collections:
      - { name: kubernetes.core, version: "UNPINNED" }
      - { name: ansible.posix,   version: "UNPINNED" }
      - { name: community.general, version: "UNPINNED" }
  - file: "dmf-infra: k3s-lab-bootstrap/ee/requirements.yml"
    purpose: "AWX EE image (ADR-0025 Lane A); also copied to ee/context/_build/requirements.yml"
    lanes: [sandbox-required, aws-required]
    must_exact_pin_before_release: true
    drift_note: >-
      ee/requirements.yml and ee/context/_build/requirements.yml are duplicates
      that differ only in a comment (630-zot-seed-platform vs 630-awx-ee). WP5
      should fail if their collection sets diverge.
    collections:
      - { name: kubernetes.core,   version: ">=5.0.0,<6.0.0",  pin_status: ranged }
      - { name: community.general, version: ">=9.0.0,<11.0.0", pin_status: ranged }
      - { name: ansible.posix,     version: ">=1.6.0,<2.0.0",  pin_status: ranged }
      - { name: community.docker,  version: ">=3.10.0,<5.0.0", pin_status: ranged }
  - file: "dmf-runbooks: requirements.yml"
    purpose: "AWX launcher / catalog runbook dependencies (nmos-cpp launch + teardown)"
    lanes: [sandbox-required, aws-required]
    must_exact_pin_before_release: true
    collections:
      - { name: ansible.posix, version: "UNPINNED" }
      - { name: ansible.netcommon, version: "UNPINNED" }
      - { name: kubernetes.core, version: "UNPINNED" }
  - file: "dmf-media: requirements.yml"
    purpose: "media-domain playbooks and helper roles"
    lanes: [sandbox-required, aws-required]
    must_exact_pin_before_release: true
    collections:
      - { name: ansible.posix, version: "UNPINNED" }
      - { name: ansible.utils, version: "UNPINNED" }
      - { name: community.hashi_vault, version: "UNPINNED" }
      - { name: kubernetes.core, version: "UNPINNED" }
  - file: "dmf-central: requirements.yml"
    purpose: "central-services scaffold dependencies"
    lanes: [deferred]
    must_exact_pin_before_release: false
    note: "Deferred from v0.1 composition; exact-pin before promotion into a release lane."
    collections:
      - { name: ansible.posix, version: "UNPINNED" }
      - { name: ansible.utils, version: "UNPINNED" }
      - { name: community.hashi_vault, version: "UNPINNED" }
      - { name: kubernetes.core, version: "UNPINNED" }

# ---------------------------------------------------------------------------
# 9. Toolchain (record exact versions before release)
# ---------------------------------------------------------------------------
toolchain:
  must_record_before_release: true
  note: >-
    Versions not yet pinned in public docs. WP5 must record the exact versions
    used for the passing verification run.
  components:
    - { name: ansible-core, role: "playbook + EE build", version: TBD }
    - { name: ansible-builder, role: "AWX EE build (ADR-0025)", version: TBD }
    - { name: helm, role: "chart installs", version: TBD }
    - { name: kubectl, role: "raw-manifest applies + verification", version: TBD }
    - { name: skopeo, role: "image seed/mirror (workstation)", version: TBD }
    - { name: "opentofu/terraform", role: "AWS Layer-1 (aws lane only)", version: TBD, lanes: [aws-required] }

# ---------------------------------------------------------------------------
# 10. Release gates (WP5-enforced; see companion doc + WP5 plan)
# ---------------------------------------------------------------------------
gates:
  v0_1_tag_gating_lane: sandbox-required   # ONLY the sandbox row gates the tag
  aws_lane: informational-unless-passed    # ships in tag only if it also passes
  lab_lane: reference-only                  # never a release pass/fail
  fail_conditions:
    - "Any sandbox-required or aws-required component carries a floating Helm chart, image, or collection ref (must_pin_before_release / must_exact_pin_before_release still true) for the lane being released."
    - "This manifest and a role default / playbook value disagree (e.g. nmos seed chart version/digest)."
    - "A sandbox-required or aws-required runtime image has no linux/arm64 manifest (arch_arm64 != confirmed)."
    - "A component_repos[].current_observed_ref is still provisional at tag time without an explicit operator waiver."
    - "k3s version pins in 300-k3s.yml disagree with each other or with this manifest."
    - "The host OS for the lane being released does not match host_os (family/version/arch): the sandbox node is not Debian 12 (bookworm) on linux/arm64, or the AWS lane does not boot a Debian 12 arm64 AMI."
  passing_record:
    note: "WP5 records, per lane, the passing component SHAs, image digests, and verification env id here at tag time."
    sandbox_single_node: { status: not-yet-verified }
    aws_arm64_multi_node: { status: not-yet-verified }

# ---------------------------------------------------------------------------
# 11. Known gaps (current, exact — do not lose these)
# ---------------------------------------------------------------------------
known_gaps:
  - id: nmos-seed-chart-version-fallback
    severity: patched          # was release-blocker; tactical fix landed 2026-05-26
    status: patched-wp5-must-enforce
    where: "dmf-infra: k3s-lab-bootstrap/playbooks/630-zot-seed-platform.yml:105,106"
    resolved_2026_05_26: >-
      Tactical patch landed in dmf-infra b644c3a: the two fallback defaults are
      now nmos_cpp_seed_chart_version=default('0.1.1') and
      nmos_cpp_seed_chart_digest=default('sha256:827bce1a0a769bd996033232d178ad1b057879f4619d8ef17ca1281903bd5ba0'),
      so the tree is no longer knowingly wrong. Residual obligation below is on
      WP5, not on the tree.
    detail: >-
      Fallback defaults WERE nmos_cpp_seed_chart_version=default('0.1.0') and
      nmos_cpp_seed_chart_digest=default('sha256:4de20135...c32d648c1'), while
      the live values (awx-integration defaults:185,186) are 0.1.1 /
      sha256:827bce... The live var wins WHEN DEFINED, so this only bit an unset
      invocation, but it is exactly the manifest/role-default disagreement WP5
      must fail on.
    decision_2026_05_26: >-
      AGREED ACTION: do the tactical patch, then enforce the stronger release
      rule. Before v0.1, update the two fallback defaults to 0.1.1 /
      sha256:827bce... so the tree is not knowingly wrong. The longer-term
      release posture is that the version manifest owns the nmos chart version
      and digest; WP5 must fail unless the manifest, dmf-media Chart.yaml,
      awx-integration defaults, 630-zot-seed-platform.yml, dmf-runbooks
      launch-nmos-cpp.yml, and the published OCI chart digest all agree (where
      the digest is reachable). Future hardening may remove the fallback
      entirely so an unset chart version/digest fails loudly.
  - id: floating-third-party-images
    severity: release-blocker-per-lane
    detail: >-
      latest/floating tags: netbox bitnami/valkey:latest; landing-page
      curlimages/curl:latest (x2) and nginx:alpine; prometheus
      python:3.13-alpine; openbao-raft-snapshot openbao/openbao:latest;
      amazon/aws-cli:latest (postgres-backups, openbao-raft-snapshot,
      resilience-verify, zot-mirror); quay.io/skopeo/stable:latest (zot-mirror).
      See third_party_images[] entries with must_pin_before_release: true.
  - id: openbao-image-inconsistency
    severity: medium
    detail: >-
      openbao server is pinned (2.5.2) but the raft-snapshot CronJob uses
      openbao/openbao:latest. Align both to a single pinned version.
  - id: unpinned-and-ranged-ansible-collections
    severity: release-blocker
    detail: >-
      Release-lane requirements files are fully unpinned (dmf-infra
      k3s-lab-bootstrap/requirements.yml, dmf-runbooks/requirements.yml,
      dmf-media/requirements.yml); EE requirements use ranges. Exact-pin all
      release-lane entries before release. dmf-central requirements are
      unpinned too but deferred from v0.1. See ansible_collections[].
  - id: dmf-cms-runtime-version-resolution
    severity: medium
    where: "dmf-cms: scripts/publish-to-ghcr.sh; charts/dmf-cms/values.yaml"
    detail: >-
      dmf-cms image tag is read from the sibling VERSION file at runtime (good
      for dev). A release install should resolve the tag through THIS manifest
      so the released console image is pinned, not whatever VERSION says at
      deploy time.
  - id: k3s-version-double-pin
    severity: low
    where: "dmf-infra: k3s-lab-bootstrap/playbooks/300-k3s.yml:56,139"
    detail: "k3s_version is duplicated across the server and agent plays. They agree now; WP5 must fail on divergence."
  - id: ee-requirements-duplication
    severity: low
    detail: "ee/requirements.yml duplicated at ee/context/_build/requirements.yml; keep them in lockstep."
  - id: netbox-forgejo-sandbox-necessity
    severity: scope-open
    detail: >-
      NetBox (SoT) and Forgejo (automation repos) are marked sandbox-required
      provisionally. WP1S must confirm whether the single-node reference deploy
      actually needs them or can trim them.
