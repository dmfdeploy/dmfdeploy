name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck bin/
        run: |
          set -eu
          shopt -s nullglob
          scripts=(bin/*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "SKIP: no scripts found in bin/"
            exit 0
          fi
          # Gate on warnings+errors; style/info findings stay advisory
          # (legacy-script style burndown is follow-up work, not a gate).
          shellcheck --severity=warning "${scripts[@]}"
  check-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Regenerate plans index
        run: bin/generate-plans-index.sh --check
      - name: Run doc gate
        run: bin/check-docs.sh
