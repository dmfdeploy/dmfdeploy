name: issue-close-reconciler

on:
  schedule:
    - cron: "0 6 * * *"  # daily 06:00 UTC
  workflow_dispatch:
  # NOTE: deliberately no `pull_request: closed` (on-merge) trigger. It would
  # never fire for the PRs this reconciler exists to backstop: our auto-merge
  # completes as the github-actions bot using GITHUB_TOKEN, and GitHub does not
  # create workflow runs from GITHUB_TOKEN-attributed events (recursion
  # prevention) — the very same bot-actor limitation that kills native
  # auto-close (accepted as status quo in #54). Human same-repo merges already
  # auto-close natively, so an on-merge run is redundant there too. The daily
  # schedule (+ manual workflow_dispatch) is the real convergence path. (#79)

permissions:
  contents: read
  issues: write
  pull-requests: read  # GraphQL reads PR fields via closedByPullRequestsReferences

jobs:
  reconcile:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Reconcile completed issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bin/close-completed-issues.sh --apply
