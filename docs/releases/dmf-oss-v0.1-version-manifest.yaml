# DMF OSS v0.1 — Version Manifest / Bill of Materials
#
# PHYSICAL SOURCE OF TRUTH for the OSS v0.1 release composition.
# Human-facing companion: "DMF OSS v0.1 Version Manifest.md" (same dir).
#
# Governs release reproducibility under ADR-0031 (sandbox-first profile
# matrix). This is a WP0/WP5 release-discipline artifact, NOT a new ADR.
#
# STATUS: DRAFT. Values are a provisional snapshot taken 2026-05-26 from the
# local component repos. Component refs are OBSERVED HEADs, not release tags
# (see component_repos[].provisional). Floating image/chart/collection refs
# are recorded honestly with a must_*_before_release flag rather than being
# pretended acceptable.
#
# WP5 owns enforcement (see gates.* and the verifier checklist). No verifier
# script ships with this manifest yet — the checks below are the spec WP5
# implements.

schema_version: 1
release: dmf-oss-v0.1
manifest_status: draft
generated: "2026-05-26"
generated_from: "local component repo HEADs (umbrella dmfdeploy@8ae2a34)"
governing_adr: ADR-0031   # OSS v0.1 sandbox-and-AWS release-profile matrix
anchor_plan: "docs/plans/DMF OSS v0.1 WP0 Release Contract and Profile Matrix 2026-05-25.md"
verification_owner: "docs/plans/DMF OSS v0.1 WP5 Release Verification and Tagging 2026-05-25.md"

# ---------------------------------------------------------------------------
# Lane classification vocabulary (ADR-0031 profile matrix).
# Every release-relevant component below carries `lanes: [...]` drawn from
# these. A component may belong to more than one lane.
# ---------------------------------------------------------------------------
lane_classes:
  sandbox-required: >-
    Part of the `sandbox-single-node` profile, which GATES v0.1. The tag is
    blocked unless every sandbox-required component is pinned, arm64-available,
    and passes the WP5 sandbox row from a fresh clone.
  aws-required: >-
    Part of the `aws-arm64-multi-node` secondary lane. Must be pinned/arm64
    before the AWS row can pass, but the AWS row is informational and never
    gates v0.1 (ADR-0031 Profile 2).
  lab-only: >-
    Used only by the `g2r6-foa9` reference/regression lab (Profile 3). Not a
    release profile; exempt from v0.1 release scrutiny. Recorded here for
    completeness and drift tracking, NOT as a release gate.
  optional: >-
    Shippable in a profile but not required by its gate (e.g. monitoring is
    trimmed/optional in sandbox). If actually shipped in a release lane it
    inherits that lane's pin/arch rules.
  deferred: >-
    Present in the workspace but out of v0.1 scope (scaffold / future work).
    Excluded from the release composition.

# Architecture requirement (ADR-0031 common gate 3, WP5 arm64 gate):
#   Every sandbox-required and aws-required RUNTIME IMAGE must have a
#   linux/arm64 manifest. `arch_arm64: verify` = not yet asserted by WP5.
arch_requirement:
  required_for_lanes: [sandbox-required, aws-required]
  platform: linux/arm64

