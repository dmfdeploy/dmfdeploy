name: ci
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck bin/
        run: |
          set -eu
          shopt -s nullglob
          scripts=(bin/*.sh bin/lib/*.sh tests/*.sh)
          if [ ${#scripts[@]} -eq 0 ]; then
            echo "SKIP: no scripts found in bin/"
            exit 0
          fi
          # Gate on warnings+errors; style/info findings stay advisory
          # (legacy-script style burndown is follow-up work, not a gate).
          shellcheck --severity=warning "${scripts[@]}"
      - name: close-completed-issues candidate-filter self-test
        # Pure-local unit tests (no network/token) guarding the candidate
        # filter against false-close regressions (refs #47).
        run: bash bin/close-completed-issues.sh --self-test
      - name: public-safety worktree regression (R1 §7)
        # Proves the gates scan a git worktree instead of silently skipping it
        # (public canary only; no operator-private include needed).
        run: bash tests/worktree-regression.sh
      - name: gitleaks rules generator — drift check + self-test (R1 §4/§9)
        # --check: the .gitleaks.toml [[rules]] region matches the manifest.
        # --self-test: per-engine canary MATCH tests + the useDefault coverage
        # proof (positives caught, negatives not) — resolves the PINNED
        # gitleaks (8.21.2 + sha256) itself, same binary guard.yml pins.
        run: |
          python3 bin/gen-gitleaks-rules.py --check
          python3 bin/gen-gitleaks-rules.py --self-test
      - name: scan library self-test (R1 §5–§6; acceptance rows 10/11 + canaries)
        # Hermetic fixture repos: §5.4 opt-out authorization, fail-closed
        # missing-private-manifest, seeded-sentinel LEAK_FOUND through the
        # tree/staged/range surfaces, worktree scanning, §4.2 redaction,
        # ephemeral merged-config cleanup. Never reads operator data.
        run: bin/dmf-scan self-test
      - name: acceptance matrix — public rows through the real callers (R1 §8)
        # Seeded DMF-CANARY sentinel + synthetic private fixture exercised
        # through the ACTUAL caller wiring: pre-commit/pre-push hooks, scrub,
        # export-scan (fixture umbrella), the dmf-env gate, plus fail-closed
        # row 10 and the §5.4 opt-out spoof row 11. The §9.1 parity gate that
        # previously ran here completed its precondition role at the caller
        # switchover (evidence on the tracking issue); the private rows run
        # operator-locally via tests/acceptance-matrix.sh --private.
        run: bash tests/acceptance-matrix.sh
  check-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Regenerate plans index
        run: bin/generate-plans-index.sh --check
      - name: Run doc gate
        run: bin/check-docs.sh
      - name: Working-model block sync
        run: bin/check-working-model-sync.sh --umbrella-only
  skills-sync:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false
      - name: Skills canonical-only invariant (.agents/skills/ is the only tracked copy)
        run: bin/sync-skills.sh --check --umbrella-only
