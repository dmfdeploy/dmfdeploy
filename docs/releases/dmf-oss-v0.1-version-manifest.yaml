# ---------------------------------------------------------------------------
# 2b. Host operating system (node base OS — a release component)
# ---------------------------------------------------------------------------
# The node OS is part of the BOM, not an environmental detail: the Layer-2
# host playbooks (200-baseline "Debian 12", 210-harden, 211-kernel-cve) are
# written for Debian 12, so OS family/version/arch is a release-relevant pin.
# ADR-0031 states the release claim as "one ARM64 Debian host".
host_os:
  release_claim: >-
    OSS v0.1 targets an ARM64 Debian 12 (bookworm) host for the
    sandbox-single-node profile (ADR-0031). The aws-arm64-multi-node lane
    carries the same OS family/version/arch requirement (Debian 12 arm64 AMI).
  wp5_enforcement: >-
    WP5 must verify host OS family + version + arch for the lane being
    released: the sandbox row fails unless the node reports Debian 12
    (bookworm) on linux/arm64; the AWS row must boot a Debian 12 arm64 AMI.
  lanes:
    - lane: sandbox-single-node
      os_family: debian
      distribution: "Debian GNU/Linux 12 (bookworm)"
      version: "12"
      codename: bookworm
      platform: linux/arm64
      arch_arm64: confirmed          # node Ready at first-acceptance 2026-05-26
      gates_v0_1: true               # sandbox lane gates the tag
      source: >-
        dmf-env: inventories/dmf-sandbox + live first-acceptance check
        (`kubectl get nodes -o wide` reported Debian GNU/Linux 12 (bookworm),
        6.1.0-cloud-arm64). Local backing host was a Lima template://debian-12
        VM, but the lane is provider-agnostic — the OS pin is what matters, not
        the VMM (bare metal / VPS / QEMU are equivalent).
    - lane: aws-arm64-multi-node
      os_family: debian
      distribution: "Debian 12 (bookworm) arm64 AMI"
      version: "12"
      codename: bookworm
      platform: linux/arm64
      arch_arm64: required
      gates_v0_1: false              # secondary lane; informational, never gates v0.1
      source: >-
        dmf-env: terraform/modules/aws/cluster/main.tf (aws_ami data source:
        owner 136693071363 = Debian, name debian-12-arm64-*, architecture
        arm64; comment ties it to spec.topology.os=debian-12 and the hetzner
        module's debian-12 image). NOTE: the AWS module is still WIP/uncommitted
        in dmf-env at manifest time — confirm the resolved AMI id before the AWS
        row passes.

